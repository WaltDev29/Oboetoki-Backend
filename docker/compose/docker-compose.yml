name: oboetoki

services:
  db:
    image: mysql:8.0
    container_name: oboetoki-db
    restart: always
    env_file:
      - ../env/.env.db
    ports:
      - "3306:3306"
    volumes:
      - oboetoki_db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: oboetoki-api
    restart: always
    env_file:
      - ../env/.env.api
    ports:
      - "8000:8000"
    volumes:
      - ../../services/api:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  oboetoki_db_data: