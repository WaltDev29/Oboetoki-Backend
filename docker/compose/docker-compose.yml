version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: oboetoki_db
    restart: always
    env_file:
      - ../env/.env.db
    ports:
      - "3306:3306"
    volumes:
      - oboetoki_db_data:/var/lib/mysql
    networks:
      - oboetoki_network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: oboetoki_api
    restart: always
    env_file:
      - ../env/.env.api
    ports:
      - "8000:8000"
    volumes:
      - ../../services/api:/app
    depends_on:
      - db
    networks:
      - oboetoki_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  oboetoki_db_data:

networks:
  oboetoki_network:
    driver: bridge
